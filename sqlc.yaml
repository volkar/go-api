version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/platform/database/queries/*.sql"
    schema: "./internal/platform/database/migrations"
    gen:
      go:
        package: "db"
        out: "./internal/platform/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - column: "albums.access"
            go_type: "api/internal/domain/shared/types.Access"
          - column: "albums.atlas"
            go_type: "api/internal/domain/shared/types.Atlas"
          - column: "users.role"
            go_type: "api/internal/domain/shared/types.Role"
